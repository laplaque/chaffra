name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo check

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy -- -D warnings

  duplication-regression:
    name: duplication bounded output
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Build CLI
        run: cargo build -p chaffra-cli
      - name: "Regression: default JSON dupes"
        run: |
          cargo run -p chaffra-cli -- dupes . --format json --telemetry off > /tmp/dupes-default.json
          size=$(wc -c < /tmp/dupes-default.json)
          echo "Output size: ${size} bytes"
          if [ "$size" -ge 4194304 ]; then echo "FAIL: output >= 4MB gRPC limit"; exit 1; fi
          python3 -c "
          import json, sys
          d = json.load(open('/tmp/dupes-default.json'))
          c = d['metrics']['counters']
          print(f\"findings={len(d['findings'])} raw={c['raw_clone_pairs']} families={c['clone_families']} reported={c['reported_findings']} collapsed={c['collapsed_matches']}\")
          assert len(d['findings']) > 0, 'no findings'
          assert c['raw_clone_pairs'] >= c['clone_families'], 'raw < families'
          "
      - name: "Regression: terminal bounded output"
        run: |
          cargo run -p chaffra-cli -- dupes . --min-tokens 100 --format terminal --telemetry off > /tmp/dupes-terminal.txt
          lines=$(wc -l < /tmp/dupes-terminal.txt)
          echo "Output lines: ${lines}"
          if [ "$lines" -ge 10000 ]; then echo "FAIL: terminal output >= 10000 lines"; exit 1; fi
          head -20 /tmp/dupes-terminal.txt
      - name: "Regression: mild mode JSON dupes"
        run: |
          cargo run -p chaffra-cli -- dupes . --mode mild --min-tokens 30 --format json --telemetry off > /tmp/dupes-mild.json
          size=$(wc -c < /tmp/dupes-mild.json)
          echo "Output size: ${size} bytes"
          if [ "$size" -ge 4194304 ]; then echo "FAIL: output >= 4MB gRPC limit"; exit 1; fi
          python3 -c "
          import json, sys
          d = json.load(open('/tmp/dupes-mild.json'))
          c = d['metrics']['counters']
          print(f\"findings={len(d['findings'])} raw={c['raw_clone_pairs']} families={c['clone_families']} reported={c['reported_findings']} collapsed={c['collapsed_matches']}\")
          assert len(d['findings']) <= 200, f'findings {len(d[\"findings\"])} exceeds max-families cap'
          assert c['raw_clone_pairs'] >= c['clone_families'], 'raw < families'
          "

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

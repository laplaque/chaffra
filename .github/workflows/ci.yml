name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Single source of truth for the Python version used by the coverage jobs.
  COVERAGE_PYTHON_VERSION: "3.11"
  # Pinned cargo-llvm-cov version installed via taiki-e/install-action. Bump
  # together with the comment in the `coverage` job for reviewer visibility.
  CARGO_LLVM_COV_VERSION: "0.6.21"

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo check

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy -- -D warnings

  duplication-regression:
    name: duplication bounded output
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Build CLI
        run: cargo build -p chaffra-cli
      - name: "Regression: default JSON dupes"
        run: |
          cargo run -p chaffra-cli -- dupes . --format json --telemetry off > /tmp/dupes-default.json
          size=$(wc -c < /tmp/dupes-default.json)
          echo "Output size: ${size} bytes"
          if [ "$size" -ge 4194304 ]; then echo "FAIL: output >= 4MB gRPC limit"; exit 1; fi
          python3 -c "
          import json, sys
          d = json.load(open('/tmp/dupes-default.json'))
          c = d['metrics']['counters']
          print(f\"findings={len(d['findings'])} raw={c['raw_clone_pairs']} families={c['clone_families']} reported={c['reported_findings']} collapsed={c['collapsed_matches']}\")
          assert len(d['findings']) > 0, 'no findings'
          assert c['raw_clone_pairs'] >= c['clone_families'], 'raw < families'
          "
      - name: "Regression: terminal bounded output"
        run: |
          cargo run -p chaffra-cli -- dupes . --min-tokens 100 --format terminal --telemetry off > /tmp/dupes-terminal.txt
          lines=$(wc -l < /tmp/dupes-terminal.txt)
          warnings=$(grep -c '\[W\]' /tmp/dupes-terminal.txt || true)
          families=$(grep -c 'clone family' /tmp/dupes-terminal.txt || true)
          echo "Output lines: ${lines}, [W] warnings: ${warnings}, clone family mentions: ${families}"
          if [ "$lines" -ge 500 ]; then echo "FAIL: terminal output >= 500 lines"; exit 1; fi
          if [ "$warnings" -ge 200 ]; then echo "FAIL: [W] count >= 200 (old baseline was 1566)"; exit 1; fi
          if [ "$families" -eq 0 ]; then echo "FAIL: no 'clone family' in output — grouped format missing"; exit 1; fi
          echo "Terminal regression OK: ${warnings} warnings, ${families} clone families, ${lines} lines"
      - name: "Regression: mild mode JSON dupes"
        run: |
          cargo run -p chaffra-cli -- dupes . --mode mild --min-tokens 30 --format json --telemetry off > /tmp/dupes-mild.json
          size=$(wc -c < /tmp/dupes-mild.json)
          echo "Output size: ${size} bytes"
          if [ "$size" -ge 4194304 ]; then echo "FAIL: output >= 4MB gRPC limit"; exit 1; fi
          python3 -c "
          import json, sys
          d = json.load(open('/tmp/dupes-mild.json'))
          c = d['metrics']['counters']
          print(f\"findings={len(d['findings'])} raw={c['raw_clone_pairs']} families={c['clone_families']} reported={c['reported_findings']} collapsed={c['collapsed_matches']}\")
          assert len(d['findings']) <= 200, f'findings {len(d[\"findings\"])} exceeds max-families cap'
          assert c['raw_clone_pairs'] >= c['clone_families'], 'raw < families'
          "

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  coverage-checker-tests:
    name: coverage checker tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # SHA-pinned to the commit at the v5 tag (currently v5.6.0). The
      # other actions used here (`checkout`) already appear in this
      # workflow under the repository's existing major-tag style; keep
      # that style for the ones the repository was already trusting at
      # the major tag.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.COVERAGE_PYTHON_VERSION }}
      - name: Run unit tests
        run: python3 -m unittest discover -s scripts/tests -v
      - name: Install coverage.py
        # Pinned exact version for reproducibility; coverage.py has no runtime
        # deps so --no-deps keeps the install closed.
        run: python3 -m pip install --no-deps "coverage==7.14.2"
      - name: Enforce checker self-coverage (100%, trust-boundary standard)
        # The Rust `coverage` job below does not measure this Python checker
        # (it is Rust-only). The checker is security/validation/trust-boundary
        # code in its entirety, so it is held to the policy's 100% rule, not
        # the 95% delta rule. Config + threshold live in
        # scripts/tests/.coveragerc (fail_under = 100, line + branch).
        run: |
          set -euo pipefail
          python3 -m coverage run --rcfile=scripts/tests/.coveragerc \
            -m unittest discover -s scripts/tests
          python3 -m coverage report --rcfile=scripts/tests/.coveragerc

  # Coverage runs as three coupled jobs so the 100% trust-boundary gate can
  # see code that only one target compiles:
  #   coverage-prep        — resolve the base/head SHAs and PR/push mode once.
  #   coverage-instrument  — a per-target-OS matrix; each leg runs
  #                          `cargo llvm-cov` and uploads that target's LCOV.
  #   coverage             — download every target's LCOV, merge them, and run
  #                          the checker (the gate). This is the job branch
  #                          protection should require.
  # `#[cfg(target_os = "...")]` / `#[cfg(target_arch = "...")]` code is
  # compiled (and therefore instrumented) only on the matching leg; merging
  # the per-leg LCOV is what lets the single gate enforce coverage across all
  # targets the matrix builds — closing chaffra#49.
  coverage-prep:
    name: coverage (resolve shas)
    # Run only on PRs (changed-line gates) and pushes to main (overall gate).
    # Skipping feature-branch pushes removes the duplicate execution that
    # would otherwise run alongside every PR with different enforcement.
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      base: ${{ steps.shas.outputs.base }}
      head: ${{ steps.shas.outputs.head }}
      mode: ${{ steps.shas.outputs.mode }}
    steps:
      - name: Resolve head SHA and mode
        id: prep
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            # Use the PR head SHA for both checkout and labeling. Defaulting
            # to the synthetic merge commit (`refs/pull/N/merge`) would
            # generate LCOV from a tree whose line numbers diverge from the
            # head when main has moved, so the diff coordinates and the
            # coverage records would disagree.
            head="$PR_HEAD_SHA"
            mode="pr"
          else
            head="$GITHUB_SHA"
            mode="push"
          fi
          echo "head=$head" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.prep.outputs.head }}
          fetch-depth: 0
      - name: Resolve base SHA
        id: shas
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ steps.prep.outputs.head }}
          MODE: ${{ steps.prep.outputs.mode }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
          else
            base="$PUSH_BEFORE_SHA"
            # Now that the checkout exists the fallback hits a real git
            # repository: rev-parse can walk HEAD^ instead of silently
            # collapsing base to head on a new-branch push.
            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
              base="$(git rev-parse --verify "${HEAD_SHA}^" 2>/dev/null || echo "$HEAD_SHA")"
            fi
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"

  coverage-instrument:
    name: coverage (instrument ${{ matrix.label }})
    needs: coverage-prep
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      # One target failing must not cancel the others — we need every leg's
      # LCOV to merge, and a real platform failure should surface on its own.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            # `covers` lists the cfg target tokens this leg's build
            # instruments. scripts/tests/test_coverage_check.py parses these
            # to enforce that no trust-boundary file gates code on a target
            # the matrix does not build (the mechanical replacement for the
            # old inactive-cfg carve-out). macos-latest is Apple-silicon
            # (aarch64); ubuntu is x86_64. Windows is NOT in the matrix:
            # chaffra-autofix uses `std::os::unix` unconditionally, so the
            # workspace does not compile on Windows today — a windows-latest
            # leg can never produce LCOV. Empirically verified by an earlier
            # 3-leg attempt (laplaque/chaffra#52). If Windows support is ever
            # added, this matrix gains a `windows-latest` leg in the same PR.
            covers: "target_os=linux target_arch=x86_64"
          - os: macos-latest
            label: macos
            covers: "target_os=macos target_arch=aarch64"
    defaults:
      run:
        # GitHub's Windows runners ship Git Bash; forcing bash keeps the
        # heredocs and `set -euo pipefail` identical across all three legs.
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.coverage-prep.outputs.head }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      # Guarantees a `python3` on every runner (including Windows, which does
      # not reliably expose `python3` by default) for the LCOV path
      # normalization step below. SHA-pinned to the commit at the v5 tag.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.COVERAGE_PYTHON_VERSION }}
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install protoc --no-progress -y
      - name: Install cargo-llvm-cov
        # Pin: see CARGO_LLVM_COV_VERSION in the workflow env block. The
        # installer action is SHA-pinned to the current commit at the v2 tag.
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: cargo-llvm-cov@${{ env.CARGO_LLVM_COV_VERSION }}
      - name: Verify resolved head SHA matches checkout
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          expected="${{ needs.coverage-prep.outputs.head }}"
          if [ "$actual" != "$expected" ]; then
            echo "checkout HEAD ($actual) != resolved head ($expected)" >&2
            exit 1
          fi
      - name: Generate LCOV (${{ matrix.label }})
        run: |
          set -euo pipefail
          mkdir -p coverage
          # One coverage build per target OS/arch (see the matrix `covers`
          # field). cargo-llvm-cov instruments only code the current target
          # compiles, so `#[cfg(target_os = "...")]`-gated code is captured
          # on the leg whose target matches; the merge step in the `coverage`
          # job unions the per-leg LCOV so the 100% trust-boundary gate sees
          # all targets the matrix builds.
          #
          # --features enumerates every non-default feature in the workspace
          # by name (today only chaffra-telemetry/cloudwatch) so feature-gated
          # executable code reaches the LCOV DA records. We do NOT pass
          # --all-features: chaffra#51 tracks a global-cwd race in
          # test_run_with_telemetry_end_to_end that the larger --all-features
          # test set exposes. When a new non-default feature is added, append
          # it here and to CONTRIBUTING.md; a test enforces both.
          cargo llvm-cov --workspace \
            --features chaffra-telemetry/cloudwatch \
            --lcov --output-path coverage/lcov.info
      - name: Normalize LCOV SF paths to repo-relative POSIX
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          set -euo pipefail
          # cargo-llvm-cov emits each SF path using the HOST OS's path
          # conventions — an absolute path under the checkout, with backslashes
          # and a drive letter on Windows. The `coverage` job merges every
          # leg's LCOV on a Linux runner and keys files by repo-relative POSIX
          # path, so a Windows SF block like
          # `SF:D:\a\chaffra\chaffra\crates\...\config.rs` would never match
          # the policy key `crates/.../config.rs` and would silently drop out
          # of the gate — making the non-Linux legs decorative. Relativize each
          # leg's LCOV HERE, where the host path semantics are known, so the
          # merge sees identical repo-relative keys from every target.
          python3 - "$WORKSPACE" <<'PY'
          import pathlib
          import sys

          workspace = sys.argv[1].replace("\\", "/").rstrip("/") + "/"
          lcov = pathlib.Path("coverage/lcov.info")
          out = []
          for line in lcov.read_text(encoding="utf-8").splitlines():
              if line.startswith("SF:"):
                  sf = line[len("SF:"):].replace("\\", "/")
                  if sf.startswith(workspace):
                      sf = sf[len(workspace):]
                  line = "SF:" + sf
              out.append(line)
          lcov.write_text("\n".join(out) + "\n", encoding="utf-8")
          PY
      - name: Verify runner target matches the leg's declared `covers`
        env:
          COVERS: ${{ matrix.covers }}
        run: |
          set -euo pipefail
          # The H4 guard test trusts each leg's `covers:` declaration as
          # ground truth for what this leg compiles. Make that declaration
          # self-verifying: compare it against rustc's actual host triple so a
          # drift in runner image (or an edited `os:` without an edited
          # `covers:`) fails the build instead of silently lying to the guard.
          host="$(rustc -vV | sed -n 's/^host: //p')"
          echo "rustc host triple: $host  (declared covers: $COVERS)"
          for token in $COVERS; do
            key="${token%%=*}"
            val="${token#*=}"
            case "$key" in
              target_arch)
                case "$host" in
                  "$val"-*) ;;
                  *) echo "covers claims $token but host triple is $host" >&2; exit 1;;
                esac ;;
              target_os)
                case "$val" in
                  linux)   needle="linux" ;;
                  macos)   needle="darwin" ;;
                  windows) needle="windows" ;;
                  *)       needle="$val" ;;
                esac
                case "$host" in
                  *"$needle"*) ;;
                  *) echo "covers claims $token but host triple is $host" >&2; exit 1;;
                esac ;;
              *) echo "unknown covers key: $key" >&2; exit 1;;
            esac
          done
      - name: Upload per-target LCOV
        # SHA-pinned: actions/upload-artifact v4.6.2 (2025-03-19).
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-lcov-${{ matrix.label }}-${{ needs.coverage-prep.outputs.head }}
          path: coverage/lcov.info
          # Fail loudly: a missing LCOV would silently shrink the merged
          # denominator in the gate job.
          if-no-files-found: error

  coverage:
    name: coverage
    needs: [coverage-prep, coverage-instrument]
    # `!cancelled()` so this gate still RUNS when an instrument leg fails,
    # rather than being silently skipped by the implicit success() of `needs`.
    # A skipped required check would leave the PR stuck (neither pass nor
    # fail); instead the gate runs and the "Require all instrument legs" step
    # below fails it loudly. The event filter is preserved so feature-branch
    # pushes still skip coverage entirely.
    if: ${{ !cancelled() && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require all instrument legs to have succeeded
        env:
          PREP_RESULT: ${{ needs.coverage-prep.result }}
          INSTRUMENT_RESULT: ${{ needs.coverage-instrument.result }}
        run: |
          set -euo pipefail
          # coverage-instrument is a matrix; its aggregate result is 'success'
          # only if EVERY leg succeeded. We must not certify coverage on a
          # partial set of targets — a missing leg means a target's
          # #[cfg(...)] code reached no LCOV, which would let the gate pass
          # vacuously. Fail closed and clearly instead of merging partial data.
          if [ "$PREP_RESULT" != "success" ] || [ "$INSTRUMENT_RESULT" != "success" ]; then
            echo "coverage prerequisites did not all succeed " \
                 "(prep=$PREP_RESULT, instrument=$INSTRUMENT_RESULT); " \
                 "cannot certify coverage on partial target data" >&2
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.coverage-prep.outputs.head }}
          fetch-depth: 0
      # SHA-pinned to the commit at the v5 tag (currently v5.6.0).
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.COVERAGE_PYTHON_VERSION }}
      - name: Verify resolved head SHA matches checkout
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          expected="${{ needs.coverage-prep.outputs.head }}"
          if [ "$actual" != "$expected" ]; then
            echo "checkout HEAD ($actual) != resolved head ($expected)" >&2
            exit 1
          fi
      - name: Download per-target LCOV
        # SHA-pinned: actions/download-artifact v4.3.0 (2025-04-29).
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          # Only this run's per-target artifacts (head SHA suffix); each lands
          # in its own subdirectory under lcov-artifacts/.
          pattern: coverage-lcov-*-${{ needs.coverage-prep.outputs.head }}
          path: lcov-artifacts
      - name: Merge per-target LCOV and run coverage checker
        env:
          BASE_SHA: ${{ needs.coverage-prep.outputs.base }}
          HEAD_SHA: ${{ needs.coverage-prep.outputs.head }}
          MODE: ${{ needs.coverage-prep.outputs.mode }}
        run: |
          set -euo pipefail
          mkdir -p coverage
          # Each downloaded artifact is one target's LCOV under its own
          # subdirectory. Pass them all to --lcov; the checker unions DA lines
          # across targets (a line is instrumented if any target compiled it,
          # and covered if any target exercised it).
          mapfile -t lcovs < <(find lcov-artifacts -name lcov.info | sort)
          # Expect exactly one LCOV per matrix leg. Deriving the count from
          # ci.yml's `covers:` keys (not a magic number) means adding a matrix
          # leg automatically tightens this guard. Anything less than the full
          # set would silently shrink the merged denominator and let a target's
          # cfg-gated code pass the gate by absence — refuse partial data.
          expected="$(grep -cE '^[[:space:]]+covers:' .github/workflows/ci.yml)"
          if [ "${#lcovs[@]}" -ne "$expected" ]; then
            echo "expected $expected per-target LCOV file(s) (one per matrix " \
                 "leg) but found ${#lcovs[@]} under lcov-artifacts/" >&2
            exit 1
          fi
          echo "merging ${#lcovs[@]} per-target LCOV file(s):"
          printf '  %s\n' "${lcovs[@]}"
          python3 scripts/coverage_check.py \
            --lcov "${lcovs[@]}" \
            --policy .github/coverage-policy.toml \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --json-out coverage/result.json \
            --markdown-out coverage/result.md \
            --mode "$MODE"
      - name: Append Markdown to step summary
        if: always()
        run: |
          if [ -f coverage/result.md ]; then
            cat coverage/result.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload coverage artifacts
        if: always()
        # SHA-pinned: actions/upload-artifact v4.6.2 (2025-03-19).
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-${{ needs.coverage-prep.outputs.head }}
          path: |
            lcov-artifacts/**/lcov.info
            coverage/result.json
            coverage/result.md
          if-no-files-found: warn

# Chaffra GitLab CI template
#
# Include this template in your .gitlab-ci.yml:
#   include:
#     - remote: 'https://raw.githubusercontent.com/laplaque/chaffra/main/ci/gitlab-ci.yml'
#
# Or copy it into your project and include locally.

.chaffra-base:
  image: rust:1.87-slim
  cache:
    key: chaffra-${CI_COMMIT_REF_SLUG}
    paths:
      - target/
      - .cargo/registry/
  before_script:
    - cargo build --release -p chaffra-cli || cargo install --path crates/chaffra-cli

chaffra-health:
  extends: .chaffra-base
  stage: test
  script:
    # chaffra exits 1 when findings exist; || true keeps the job green so the report is always uploaded.
    - cargo run --release -p chaffra-cli -- --format codeclimate health . > gl-code-quality-report.json || true
  artifacts:
    reports:
      codequality: gl-code-quality-report.json
    expire_in: 1 week

chaffra-dead-code:
  extends: .chaffra-base
  stage: test
  script:
    # chaffra exits 1 when findings exist; || true keeps the job green so the report is always uploaded.
    - cargo run --release -p chaffra-cli -- --format codeclimate dead-code . > gl-dead-code-report.json || true
  artifacts:
    reports:
      codequality: gl-dead-code-report.json
    expire_in: 1 week

chaffra-audit:
  extends: .chaffra-base
  stage: test
  script:
    - cargo run --release -p chaffra-cli -- --format terminal audit .
  allow_failure: false

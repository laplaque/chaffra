image: python:latest

include:
  - remote: 'https://example.com/ci-templates/base.yml'

variables:
  API_KEY: "FAKE_KEY_FOR_TESTING_ONLY"
  APP_NAME: "my-app"

stages:
  - test
  - deploy

test:
  image: python
  script:
    - pytest

deploy:
  image: python:3.12-slim
  tags:
    - docker
  script:
    - deploy.sh
